# nginx reverse proxy: TLS termination + rate limiting + tight timeouts.
# Drop into /etc/nginx/conf.d/stockpricer.conf and reload nginx.
#
# Obtain certs first, e.g.:  certbot --nginx -d quotes.example.com
# Run stockpricer bound to loopback (BIND_ADDR=127.0.0.1, the default) with
# TRUST_PROXY=1 so the app's per-client rate limiting sees real client IPs.

# ~2 req/s per IP, allowing short bursts -- far above this service's real load,
# but enough to stop floods. Tune to taste.
limit_req_zone  $binary_remote_addr zone=stockpricer_rl:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=stockpricer_cz:10m;

server {
    listen 80;
    listen [::]:80;
    server_name quotes.example.com;
    return 301 https://$host$request_uri;   # force HTTPS
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name quotes.example.com;

    ssl_certificate     /etc/letsencrypt/live/quotes.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quotes.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # abuse controls
    client_max_body_size  16k;
    client_body_timeout   10s;
    client_header_timeout 10s;
    send_timeout          15s;
    limit_req_status 429;
    limit_conn_status 429;
    limit_req  zone=stockpricer_rl burst=20 nodelay;
    limit_conn stockpricer_cz 20;

    location / {
        proxy_pass http://127.0.0.1:8849;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout    25s;
    }
}
