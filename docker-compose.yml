services:
  stockpricer:
    # Build locally, or pull the published image:
    #   image: ghcr.io/soulbasic/stockpricer:latest
    build: .
    image: ghcr.io/soulbasic/stockpricer:latest
    container_name: stockpricer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HOST: "0.0.0.0"
      PORT: "8080"
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health',timeout=4).getcode()==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
